<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaTwin - Digital Health Twin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .result-box { margin-top: 20px; display: none; }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
        .high { background: #ffebee; color: #c62828; }
        .stable { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VitaTwin Intelligence</h1>
        <p>Enter patient notes below for AI-powered risk analysis.</p>
        <textarea id="userInput" placeholder="Type user text here..."></textarea>
        <button onclick="analyzeText()">Analyze Health Risk</button>

        <div id="result" class="result-box">
            <h3>Analysis Report</h3>
            <p><strong>Status:</strong> <span id="label"></span></p>
            <p><strong>Risk Level:</strong> <span id="risk" class="tag"></span></p>
            <p><strong>Confidence Score:</strong> <span id="confidence-pct"></span></p>
            
            <hr>

            <p><strong>XAI Explanation:</strong> <span id="explanation"></span></p>
            <p><strong>Clinical Insight:</strong> <span id="insight" style="color: #555; font-style: italic;"></span></p>
        </div>
    </div>

    <!-- Add this below the previous .card div -->
    <div class="card" style="margin-top: 20px;">
        <h2>Ask VitaTwin (RAG)</h2>
        <p>Ask a specific question about the note above.</p>
        <input type="text" id="userQuestion" placeholder="e.g., What is the primary stressor?" style="width: 80%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        <button onclick="askQuestion()">Ask AI</button>
        
        <div id="rag-result" style="margin-top: 15px; display: none; background: #eef2f7; padding: 15px; border-radius: 8px;">
            <strong>AI Answer:</strong>
            <p id="answer-text"></p>
        </div>
    </div>

    <script>

        async function askQuestion() {
            const note = document.getElementById('userInput').value;
            const question = document.getElementById('userQuestion').value;
            const answerDiv = document.getElementById('rag-result');
            const answerText = document.getElementById('answer-text');
    
            if (!note || !question) {
                alert("Please provide both a patient note and a question.");
                return;
            }
    
            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: note, question: question })
                });
                const data = await response.json();

                console.log("DATA RAG : ",data)
                answerText.innerText = data.answer;
                answerDiv.style.display = 'block';
            } catch (error) {
                console.log("Vinaya ERRROR : ",error)
                alert("RAG API Error");
            }
        }


        async function analyzeText() {
            const btn = document.querySelector('button');
            const input = document.getElementById('userInput');
            const resBox = document.getElementById('result');
        
            if (!input.value.trim()) return;
        
            // 1. Enter "Loading" State
            btn.disabled = true;
            btn.innerText = "Analyzing... (this take a few seconds)";
            resBox.style.opacity = "0.5"; // Dim the old results
        
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input.value })
                });
        
                const data = await response.json();
        
                // 2. Update UI with new data
                document.getElementById('label').innerText = data.prediction.label;
                document.getElementById('risk').innerText = data.prediction.risk_factor;
                
                const confPercent = (parseFloat(data.prediction.confidence) * 100).toFixed(2) + "%";
                document.getElementById('confidence-pct').innerText = confPercent;
                
                document.getElementById('risk').className = 'tag ' + 
                    (data.prediction.risk_factor.includes('HIGH') ? 'high' : 'stable');
                document.getElementById('explanation').innerText = data.explanation;
                document.getElementById('insight').innerText = data.insight;
                
                resBox.style.display = 'block';
                resBox.style.opacity = "1";
            } catch (error) {
                alert("Error connecting to API");
            } finally {
                // 3. Reset Button so user can type and click again!
                btn.disabled = false;
                btn.innerText = "Analyze Health Risk";
            }
        }
    </script>
</body>
</html>
